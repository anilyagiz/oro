version: '3.8'

services:
  oro:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GRAIL_API_KEY=${GRAIL_API_KEY}
      - GRAIL_API_URL=${GRAIL_API_URL:-https://oro-tradebook-devnet.up.railway.app}
      - NEXT_PUBLIC_GRAIL_API_URL=${NEXT_PUBLIC_GRAIL_API_URL:-https://oro-tradebook-devnet.up.railway.app}
      - NEXT_PUBLIC_SOLANA_RPC_URL=${NEXT_PUBLIC_SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - NEXT_PUBLIC_SOLANA_NETWORK=${NEXT_PUBLIC_SOLANA_NETWORK:-devnet}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/oro/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
